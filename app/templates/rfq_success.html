{% extends "base.html" %}

{% block title %}تم إرسال طلبك | سما تكنولوجي{% endblock %}

{% block content %}
<section class="section bg-white-section" style="min-height:60vh;display:flex;align-items:center;">
    <div class="container text-center" style="max-width:600px;">
        <div style="width:80px;height:80px;background:rgba(16,185,129,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
            <i class="bi bi-check-circle-fill" style="font-size:2.5rem;color:#10b981;"></i>
        </div>
        <h1 style="font-size:1.8rem;">شكراً لك!</h1>
        <p class="lead mt-3">تم استلام طلب عرض السعر بنجاح</p>

        <div class="p-4 my-4" style="background:var(--bg-light);border-radius:var(--radius-md);">
            <p class="mb-2"><strong>رقم المرجع:</strong> <span dir="ltr">{{ ref_number }}</span></p>
            <p class="mb-0 text-muted" style="font-size:0.9rem;">سيتواصل معك فريقنا خلال 24-48 ساعة عمل</p>
        </div>

        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="{{ url_for('catalog_bp.product_list') }}" class="btn btn-primary">تصفح المنتجات</a>
            <a href="{{ url_for('main_bp.home') }}" class="btn btn-outline-primary">الصفحة الرئيسية</a>
        </div>
    </div>
</section>
{% endblock %}
